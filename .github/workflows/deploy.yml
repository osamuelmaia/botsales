name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Node + cache de node_modules (via package-lock.json) ─────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── 3. Cache do .next/cache (builds incrementais) ───────────────────────
      - uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.ts','**/*.tsx','**/*.css') }}
          restore-keys: |
            nextjs-${{ hashFiles('package-lock.json') }}-

      # ── 4. Monta .env no runner (sem risco de expansão de shell) ────────────
      - name: Prepare .env
        env:
          APP_DATABASE_URL:          ${{ secrets.APP_DATABASE_URL }}
          APP_REDIS_URL:             ${{ secrets.APP_REDIS_URL }}
          APP_NEXTAUTH_SECRET:       ${{ secrets.APP_NEXTAUTH_SECRET }}
          APP_NEXTAUTH_URL:          ${{ secrets.APP_NEXTAUTH_URL }}
          APP_GATEWAY_API_KEY:       ${{ secrets.APP_GATEWAY_API_KEY }}
          APP_GATEWAY_WEBHOOK_SECRET: ${{ secrets.APP_GATEWAY_WEBHOOK_SECRET }}
          APP_ENCRYPTION_KEY:        ${{ secrets.APP_ENCRYPTION_KEY }}
          APP_NEXT_PUBLIC_APP_URL:   ${{ secrets.APP_NEXT_PUBLIC_APP_URL }}
          APP_ASAAS_ENVIRONMENT:     ${{ secrets.APP_ASAAS_ENVIRONMENT }}
          APP_BLOB_READ_WRITE_TOKEN: ${{ secrets.APP_BLOB_READ_WRITE_TOKEN }}
        run: |
          escape() { printf '%s' "$1" | sed 's/\$/\\$/g'; }
          {
            printf "DATABASE_URL='%s'\n"             "$APP_DATABASE_URL"
            printf "REDIS_URL='%s'\n"                "$APP_REDIS_URL"
            printf "NEXTAUTH_SECRET='%s'\n"          "$APP_NEXTAUTH_SECRET"
            printf "NEXTAUTH_URL='%s'\n"             "$APP_NEXTAUTH_URL"
            printf "AUTH_TRUST_HOST=1\n"
            printf "GATEWAY_API_KEY=%s\n"            "$(escape "$APP_GATEWAY_API_KEY")"
            printf "GATEWAY_WEBHOOK_SECRET=%s\n"     "$(escape "$APP_GATEWAY_WEBHOOK_SECRET")"
            printf "ENCRYPTION_KEY=%s\n"             "$(escape "$APP_ENCRYPTION_KEY")"
            printf "NEXT_PUBLIC_APP_URL='%s'\n"      "$APP_NEXT_PUBLIC_APP_URL"
            printf "ASAAS_ENVIRONMENT='%s'\n"        "$APP_ASAAS_ENVIRONMENT"
            printf "BLOB_READ_WRITE_TOKEN=%s\n"      "$(escape "$APP_BLOB_READ_WRITE_TOKEN")"
          } > .env
          echo "ENV_B64=$(base64 -w0 .env)" >> "$GITHUB_ENV"

      # ── 5. Instala deps (usa cache do npm) ──────────────────────────────────
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # ── 6. Gera Prisma client ────────────────────────────────────────────────
      - name: Generate Prisma client
        run: npx prisma generate

      # ── 7. Build Next.js no runner (hardware melhor + cache incremental) ─────
      - name: Build
        run: npm run build

      # ── 8. Empacota apenas os artefatos de runtime (sem .next/cache) ─────────
      - name: Package build
        run: tar -czf next-build.tar.gz --exclude='.next/cache' .next/

      # ── 9. Copia artefato para a VPS ─────────────────────────────────────────
      - name: Upload build to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "next-build.tar.gz"
          target: "/tmp/"

      # ── 10. Deploy via SSH (sem build — já foi feito no runner) ──────────────
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          ENV_B64: ${{ env.ENV_B64 }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: ENV_B64
          script: |
            set -e
            cd /var/www/botsales

            echo "$ENV_B64" | base64 -d > .env
            echo "✓ .env atualizado"

            git fetch origin main
            git reset --hard origin/main

            # Instala deps só se package.json mudou
            if git diff HEAD~1 HEAD -- package.json package-lock.json | grep -q .; then
              echo "Dependências mudaram, reinstalando..."
              npm ci --legacy-peer-deps
            else
              echo "Dependências iguais, pulando npm ci"
            fi

            # Extrai build do runner (sobrescreve .next/ local)
            tar -xzf /tmp/next-build.tar.gz
            rm /tmp/next-build.tar.gz
            echo "✓ Build extraído"

            # Regenera Prisma client para o processo Node local
            npx prisma generate

            # Sincroniza schema
            npx prisma db push --skip-generate --accept-data-loss 2>&1 | tail -3 || echo "⚠ prisma db push falhou"

            pm2 restart nextjs || (pm2 delete nextjs 2>/dev/null; pm2 start npm --name nextjs -- start)
            pm2 restart bot-worker --update-env || echo "⚠ bot-worker restart falhou"
            pm2 save
            echo "Deploy concluído em $(date)"
