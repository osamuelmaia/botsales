name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /var/www/botsales

            git fetch origin main
            git reset --hard origin/main

            # Reinstala dependências só se package.json mudou
            if git diff HEAD~1 HEAD -- package.json package-lock.json | grep -q .; then
              echo "Dependências mudaram, reinstalando..."
              npm ci --legacy-peer-deps
            else
              echo "Dependências iguais, pulando npm ci"
            fi

            npm run build
            pm2 reload nextjs --update-env
            pm2 reload bot-worker --update-env
            echo "Deploy concluído em $(date)"
