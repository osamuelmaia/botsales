name: Emergency Recovery

on:
  workflow_dispatch:

jobs:
  recover:
    runs-on: ubuntu-latest
    steps:
      - name: Restart nextjs via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/botsales
            echo "=== Estado atual do PM2 ==="
            pm2 list

            echo "=== Matando processos zumbis na porta 3000 ==="
            pm2 delete nextjs 2>/dev/null || true
            sleep 2
            fuser -k 3000/tcp 2>/dev/null && echo "✓ Porta 3000 liberada" || echo "Porta 3000 já estava livre"
            pkill -f "next start" 2>/dev/null || true
            sleep 2

            echo "=== Iniciando nextjs fresh ==="
            pm2 start npm --name nextjs -- start
            pm2 save

            sleep 8
            echo "=== Logs do nextjs (últimas 50 linhas) ==="
            pm2 logs nextjs --lines 50 --nostream

            echo "=== PM2 status final ==="
            pm2 list
